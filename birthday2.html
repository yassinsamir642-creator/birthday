<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise For You...</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600;800&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #000;
            color: #fff;
            overflow-x: hidden;
        }

        /* ══════════ SCREEN 1 — DARK MYSTERY ══════════ */
        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 9000;
            transition: all 1.2s cubic-bezier(.77,0,.18,1);
        }

        .screen.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.3);
        }

        #screen1 {
            background: radial-gradient(circle at center, #0a0a1a, #000);
            cursor: pointer;
        }

        #screen1 .mystery-text {
            font-size: 1.3rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 8px;
            text-transform: uppercase;
            animation: mysterPulse 3s ease-in-out infinite;
        }

        #screen1 .tap-icon {
            margin-top: 40px;
            width: 80px; height: 80px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            animation: tapPulse 2s ease-in-out infinite;
            position: relative;
        }

        #screen1 .tap-icon::after {
            content: '';
            position: absolute;
            inset: -10px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 50%;
            animation: tapRing 2s ease-in-out infinite;
        }

        @keyframes mysterPulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; color: rgba(255,255,255,0.9); }
        }
        @keyframes tapPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); border-color: rgba(255,255,255,0.4); }
        }
        @keyframes tapRing {
            0%, 100% { transform: scale(1); opacity: 0.3; }
            50% { transform: scale(1.3); opacity: 0; }
        }

        /* Screen 2 — Countdown */
        #screen2 {
            background: #000;
            z-index: 8999;
        }

        .countdown-number {
            font-size: 15rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: scale(3);
            line-height: 1;
        }

        .countdown-number.pop {
            animation: countPop 0.9s cubic-bezier(.34,1.56,.64,1) forwards;
        }

        @keyframes countPop {
            0%   { opacity: 0; transform: scale(3); }
            40%  { opacity: 1; transform: scale(0.9); }
            60%  { transform: scale(1.05); }
            100% { opacity: 0; transform: scale(0.5); }
        }

        /* Screen 3 — Flash */
        #screen3 {
            background: #fff;
            z-index: 8998;
        }

        /* ══════════ CANVASES ══════════ */
        #fireworks, #confetti {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }
        #fireworks { z-index: 100; }
        #confetti  { z-index: 101; }

        /* ══════════ MAIN ══════════ */
        .main-content { display: none; position: relative; z-index: 50; }
        .main-content.show { display: block; }

        /* ── Hero ── */
        .hero {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 30%, #1a0035 0%, #000 70%);
        }

        .hero-glow {
            position: absolute;
            width: 500px; height: 500px;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.3;
            animation: glowMove 8s ease-in-out infinite;
        }
        .glow1 { background: #ff006e; top: -100px; left: -100px; }
        .glow2 { background: #8338ec; bottom: -100px; right: -100px; animation-delay: -4s; }
        .glow3 { background: #3a86ff; top: 50%; left: 50%; transform: translate(-50%,-50%); animation-delay: -2s; }

        @keyframes glowMove {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%      { transform: translate(30px, -20px) scale(1.1); }
            66%      { transform: translate(-20px, 30px) scale(0.9); }
        }

        .stars { position: absolute; inset: 0; overflow: hidden; }

        .star {
            position: absolute;
            width: 3px; height: 3px;
            background: #fff;
            border-radius: 50%;
            animation: twinkle linear infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        .hero-inner { position: relative; z-index: 2; padding: 20px; }

        .crown {
            font-size: 4rem;
            animation: crownBounce 2s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(255,215,0,0.5));
        }

        @keyframes crownBounce {
            0%, 100% { transform: translateY(0) rotate(0); }
            25%  { transform: translateY(-10px) rotate(-5deg); }
            75%  { transform: translateY(-10px) rotate(5deg); }
        }

        .hero-age {
            font-size: 10rem;
            font-weight: 800;
            line-height: 1;
            margin: 10px 0;
        }

        .hero-age span {
            display: inline-block;
            background: linear-gradient(135deg, #ff006e, #ff6b9d, #ffd700, #8338ec, #3a86ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: ageShimmer 4s ease-in-out infinite;
            opacity: 0;
        }

        .hero-age span.reveal {
            animation: ageReveal 0.6s cubic-bezier(.34,1.56,.64,1) forwards,
                       ageShimmer 4s ease-in-out infinite;
        }

        @keyframes ageReveal {
            0%   { opacity: 0; transform: translateY(60px) rotateX(90deg); }
            100% { opacity: 1; transform: translateY(0) rotateX(0); }
        }

        @keyframes ageShimmer {
            0%, 100% { background-position: 0% 50%; }
            50%      { background-position: 100% 50%; }
        }

        .hero-title {
            font-family: 'Pacifico', cursive;
            font-size: 4rem;
            margin: 10px 0;
            opacity: 0;
            transform: translateY(30px);
        }

        .hero-title.reveal { animation: fadeUp 1s ease forwards; }

        .hero-name {
            font-family: 'Pacifico', cursive;
            font-size: 5rem;
            background: linear-gradient(90deg, #ffd700, #ffed4a, #ffd700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: goldShine 3s linear infinite;
            filter: drop-shadow(0 0 30px rgba(255,215,0,0.3));
            opacity: 0;
            transform: scale(0.5);
        }

        .hero-name.reveal {
            animation: nameReveal 0.8s cubic-bezier(.34,1.56,.64,1) forwards,
                       goldShine 3s linear infinite;
        }

        @keyframes nameReveal {
            0%   { opacity: 0; transform: scale(0.5) rotate(-10deg); }
            100% { opacity: 1; transform: scale(1) rotate(0); }
        }

        @keyframes goldShine { to { background-position: 200% center; } }
        @keyframes fadeUp    { to { opacity: 1; transform: translateY(0); } }

        .hero-sparkle-text {
            margin-top: 20px;
            font-size: 1.1rem;
            color: rgba(255,255,255,0.5);
            letter-spacing: 3px;
            opacity: 0;
        }
        .hero-sparkle-text.reveal { animation: fadeUp 1s ease forwards; }

        .scroll-hint {
            position: absolute;
            bottom: 40px; left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            animation: fadeInDelay 1s 4s forwards;
        }

        .scroll-arrow {
            width: 30px; height: 30px;
            border-right: 2px solid rgba(255,255,255,0.3);
            border-bottom: 2px solid rgba(255,255,255,0.3);
            transform: rotate(45deg);
            margin: 0 auto;
            animation: scrollBounce 2s ease-in-out infinite;
        }

        @keyframes scrollBounce {
            0%, 100% { transform: rotate(45deg) translate(0,0); opacity: 0.3; }
            50%      { transform: rotate(45deg) translate(5px,5px); opacity: 1; }
        }
        @keyframes fadeInDelay { to { opacity: 1; } }

        /* ── Sections ── */
        .section {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 80px 20px;
            position: relative;
            overflow: hidden;
        }

        /* ── Gift ── */
        .gift-section {
            background: radial-gradient(ellipse at center, #0d001a 0%, #000 70%);
        }

        .gift-section h2 {
            font-family: 'Pacifico', cursive;
            font-size: 2.5rem;
            color: #ff6b9d;
            margin-bottom: 15px;
            opacity: 0; transform: translateY(40px);
            transition: all 1s ease;
        }
        .gift-section h2.visible { opacity: 1; transform: translateY(0); }

        .gift-section .sub {
            color: rgba(255,255,255,0.4);
            margin-bottom: 50px;
            opacity: 0;
            transition: all 1s 0.3s ease;
        }
        .gift-section .sub.visible { opacity: 1; }

        .gift-box-wrapper { perspective: 800px; cursor: pointer; }

        .gift-box {
            width: 180px; height: 180px;
            position: relative;
            transform-style: preserve-3d;
            margin: 0 auto;
        }

        .gift-body {
            width: 180px; height: 140px;
            background: linear-gradient(135deg, #ff006e, #c9184a);
            border-radius: 10px;
            position: absolute; bottom: 0;
            box-shadow: 0 20px 60px rgba(255,0,110,0.3);
        }

        .gift-body::before {
            content: '';
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 20px; transform: translateX(-50%);
            background: linear-gradient(to right, #ffd700, #ffed4a, #ffd700);
        }

        .gift-body::after {
            content: '';
            position: absolute;
            top: 50%; left: 0; right: 0;
            height: 20px; transform: translateY(-50%);
            background: linear-gradient(to bottom, #ffd700, #ffed4a, #ffd700);
        }

        .gift-lid {
            width: 200px; height: 40px;
            background: linear-gradient(135deg, #e5004f, #a00030);
            border-radius: 8px;
            position: absolute;
            top: 0; left: -10px;
            transition: all 0.8s cubic-bezier(.34,1.56,.64,1);
            transform-origin: left bottom;
            z-index: 2;
        }

        .gift-lid::before {
            content: '';
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 22px; transform: translateX(-50%);
            background: linear-gradient(to right, #ffd700, #ffed4a, #ffd700);
            border-radius: 3px;
        }

        .gift-bow {
            position: absolute;
            top: -25px; left: 50%;
            transform: translateX(-50%);
            font-size: 2.5rem; z-index: 3;
            transition: all 0.8s cubic-bezier(.34,1.56,.64,1);
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.5));
        }

        .gift-box.opened .gift-lid {
            transform: rotate(-110deg) translateY(-20px);
        }
        .gift-box.opened .gift-bow {
            transform: translateX(-100px) translateY(-40px) rotate(-30deg);
            opacity: 0;
        }

        .gift-message {
            position: absolute;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            width: 150px; text-align: center;
            opacity: 0;
            transition: all 0.8s 0.5s ease;
        }
        .gift-box.opened .gift-message { opacity: 1; bottom: 50px; }
        .gift-message span { font-size: 3rem; }

        .gift-reveal-text {
            max-width: 600px;
            margin-top: 50px;
            font-size: 1.5rem;
            font-family: 'Pacifico', cursive;
            color: #ffd700;
            opacity: 0; transform: translateY(30px);
            transition: all 1s ease;
        }
        .gift-reveal-text.show { opacity: 1; transform: translateY(0); }

        .gift-tap-hint {
            margin-top: 20px;
            color: rgba(255,255,255,0.3);
            font-size: 0.9rem;
            animation: pulse 2s infinite;
        }
        .gift-tap-hint.hide { display: none; }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        /* ── Cake ── */
        .cake-section {
            background: radial-gradient(ellipse at 50% 80%, #0d0020 0%, #000 70%);
        }

        .cake-section h2 {
            font-family: 'Pacifico', cursive;
            font-size: 2.5rem;
            color: #8338ec;
            margin-bottom: 50px;
            opacity: 0; transform: translateY(40px);
            transition: all 1s ease;
        }
        .cake-section h2.visible { opacity: 1; transform: translateY(0); }

        .cake-wrapper { cursor: pointer; position: relative; }

        .cake3d { position: relative; margin: 0 auto; width: 250px; }

        .candles-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: -5px;
            position: relative; z-index: 2;
        }

        .candle-unit { text-align: center; }

        .c-stick {
            width: 8px; height: 40px;
            margin: 0 auto;
            border-radius: 3px 3px 0 0;
        }

        .c-flame-wrap { position: relative; height: 25px; }

        .c-flame {
            width: 14px; height: 22px;
            background: radial-gradient(ellipse at bottom, #ffd700 0%, #ff6600 50%, #ff0000 100%);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            margin: 0 auto;
            animation: cFlicker 0.4s ease-in-out infinite alternate;
            box-shadow: 0 0 15px #ff9900, 0 0 30px #ff6600, 0 0 50px rgba(255,100,0,0.3);
            transition: all 0.5s;
        }
        .c-flame.out { opacity: 0; transform: scale(0); }

        @keyframes cFlicker {
            0% { transform: scale(1) rotate(-3deg); }
            100% { transform: scale(1.15) rotate(3deg); }
        }

        .c-smoke {
            width: 4px; height: 20px;
            background: rgba(200,200,200,0.3);
            border-radius: 50%;
            margin: 0 auto;
            opacity: 0; filter: blur(2px);
        }
        .c-smoke.rise { animation: smokeUp 2s ease-out forwards; }

        @keyframes smokeUp {
            0%   { opacity: 0.5; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(2.5); }
        }

        .tier1 {
            width: 120px; height: 45px;
            background: linear-gradient(135deg, #ff6b9d, #ff006e);
            border-radius: 12px 12px 4px 4px;
            margin: 0 auto; position: relative;
        }
        .tier1::before {
            content: '';
            position: absolute;
            top: -6px; left: -6px; right: -6px; height: 16px;
            background: linear-gradient(to bottom, #fff, rgba(255,200,220,0.6));
            border-radius: 10px 10px 50% 50%;
        }
        .tier1::after {
            content: '✦ ✦ ✦';
            position: absolute; bottom: 8px; left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem; color: rgba(255,255,255,0.5);
            letter-spacing: 8px;
        }

        .tier2 {
            width: 170px; height: 50px;
            background: linear-gradient(135deg, #8338ec, #6b21a8);
            margin: 0 auto; position: relative;
        }
        .tier2::before {
            content: '';
            position: absolute;
            top: -6px; left: -6px; right: -6px; height: 16px;
            background: linear-gradient(to bottom, #fff, rgba(200,180,255,0.6));
            border-radius: 10px 10px 50% 50%;
        }

        .tier3 {
            width: 220px; height: 55px;
            background: linear-gradient(135deg, #3a86ff, #1d4ed8);
            border-radius: 0 0 14px 14px;
            margin: 0 auto; position: relative;
        }
        .tier3::before {
            content: '';
            position: absolute;
            top: -6px; left: -6px; right: -6px; height: 16px;
            background: linear-gradient(to bottom, #fff, rgba(180,210,255,0.6));
            border-radius: 10px 10px 50% 50%;
        }

        .cake-base {
            width: 260px; height: 12px;
            background: linear-gradient(to bottom, #cbd5e1, #64748b);
            border-radius: 0 0 50% 50%;
            margin: 0 auto;
        }

        .cake-hint {
            margin-top: 30px;
            color: rgba(255,255,255,0.35);
            font-size: 0.95rem;
            animation: pulse 2s infinite;
        }
        .cake-hint.hide { display: none; }

        .wish-result {
            margin-top: 40px;
            font-family: 'Pacifico', cursive;
            font-size: 2.2rem;
            max-width: 500px;
            opacity: 0;
            transform: translateY(30px) scale(0.9);
            transition: all 1s cubic-bezier(.34,1.56,.64,1);
        }
        .wish-result.show { opacity: 1; transform: translateY(0) scale(1); }
        .wish-result .emoji-burst { font-size: 3rem; display: block; margin-bottom: 15px; }
        .wish-result .wish-main {
            background: linear-gradient(90deg, #ff006e, #ffd700, #8338ec, #3a86ff);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: ageShimmer 4s ease-in-out infinite;
        }

        /* ── Letter ── */
        .letter-section {
            background: radial-gradient(ellipse at 50% 50%, #0f0018 0%, #000 70%);
            padding: 100px 20px;
        }

        .letter-card {
            max-width: 600px;
            margin: 0 auto;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 30px;
            padding: 50px 40px;
            backdrop-filter: blur(10px);
            position: relative;
            opacity: 0; transform: translateY(60px);
            transition: all 1.2s ease;
        }
        .letter-card.visible { opacity: 1; transform: translateY(0); }

        .letter-card .letter-dear {
            font-family: 'Pacifico', cursive;
            font-size: 1.8rem;
            color: #ff6b9d;
            margin-bottom: 25px;
        }

        .letter-card .letter-body {
            font-size: 1.1rem;
            line-height: 2;
            color: rgba(255,255,255,0.7);
        }

        .letter-card .letter-body .highlight {
            color: #ffd700;
            font-weight: 600;
        }

        .letter-card .letter-sign {
            margin-top: 35px;
            text-align: right;
            font-family: 'Pacifico', cursive;
            font-size: 1.5rem;
            color: #8338ec;
        }

        .letter-card .letter-hearts {
            position: absolute;
            top: -15px; right: 30px;
            font-size: 1.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* ── Final ── */
        .final-section {
            background: radial-gradient(ellipse at 50% 50%, #1a0030 0%, #000 70%);
            min-height: 100vh;
        }

        .final-emoji {
            font-size: 6rem;
            animation: float 3s ease-in-out infinite;
            opacity: 0; transition: all 1s ease;
        }
        .final-emoji.visible { opacity: 1; }

        .final-text {
            font-family: 'Pacifico', cursive;
            font-size: 3.5rem;
            margin: 30px 0;
            background: linear-gradient(90deg, #ff006e, #ffd700, #8338ec, #3a86ff, #ff006e);
            background-size: 300% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: ageShimmer 5s linear infinite;
            opacity: 0; transform: scale(0.8);
            transition: all 1s 0.3s ease;
        }
        .final-text.visible { opacity: 1; transform: scale(1); }

        .final-sub {
            font-size: 1.2rem;
            color: rgba(255,255,255,0.4);
            letter-spacing: 4px;
            opacity: 0;
            transition: all 1s 0.6s ease;
        }
        .final-sub.visible { opacity: 1; }

        .floating-emojis {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 102;
            overflow: hidden;
        }

        .float-emoji {
            position: absolute;
            font-size: 2rem;
            animation: emojiRise linear forwards;
            opacity: 0;
        }

        @keyframes emojiRise {
            0%   { transform: translateY(100vh) rotate(0); opacity: 0; }
            10%  { opacity: 0.9; }
            90%  { opacity: 0.9; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .countdown-number { font-size: 9rem; }
            .hero-age { font-size: 7rem; }
            .hero-title { font-size: 2.5rem; }
            .hero-name { font-size: 3rem; }
            .final-text { font-size: 2.5rem; }
            .letter-card { padding: 30px 25px; }
        }

        @media (max-width: 480px) {
            .hero-age { font-size: 5rem; }
            .hero-title { font-size: 2rem; }
            .hero-name { font-size: 2.5rem; }
            .final-text { font-size: 2rem; }
        }
    </style>
</head>
<body>

<!-- SCREENS -->
<div class="screen" id="screen1" onclick="startCountdown()">
    <div class="mystery-text">You have a surprise</div>
    <div class="tap-icon">👆</div>
</div>

<div class="screen hidden" id="screen2">
    <div class="countdown-number" id="countNum">3</div>
</div>

<div class="screen hidden" id="screen3"></div>

<!-- CANVASES -->
<canvas id="fireworks"></canvas>
<canvas id="confetti"></canvas>
<div class="floating-emojis" id="floatingEmojis"></div>

<!-- ████ MAIN ████ -->
<div class="main-content" id="mainContent">

    <!-- HERO -->
    <section class="hero">
        <div class="hero-glow glow1"></div>
        <div class="hero-glow glow2"></div>
        <div class="hero-glow glow3"></div>
        <div class="stars" id="stars"></div>
        <div class="hero-inner">
            <div class="crown" id="heroIcon"></div>
            <div class="hero-age" id="heroAge"></div>
            <h1 class="hero-title" id="heroTitle">Happy Birthday</h1>
            <div class="hero-name" id="heroName"></div>
            <p class="hero-sparkle-text" id="heroSub"></p>
        </div>
        <div class="scroll-hint"><div class="scroll-arrow"></div></div>
    </section>

    <!-- GIFT -->
    <section class="section gift-section">
        <h2 class="gift-title">We Got You Something...</h2>
        <p class="sub gift-sub">Something special, just for you</p>
        <div class="gift-box-wrapper" onclick="openGift()">
            <div class="gift-box" id="giftBox">
                <div class="gift-bow">🎀</div>
                <div class="gift-lid"></div>
                <div class="gift-body"></div>
                <div class="gift-message"><span>💝</span></div>
            </div>
        </div>
        <p class="gift-tap-hint" id="giftHint">tap the gift to open</p>
        <div class="gift-reveal-text" id="giftRevealText"></div>
    </section>

    <!-- CAKE -->
    <section class="section cake-section">
        <h2 class="cake-title">Make a Wish! 🌟</h2>
        <div class="cake-wrapper" onclick="blowCandles()">
            <div class="cake3d">
                <div class="candles-row">
                    <div class="candle-unit">
                        <div class="c-flame-wrap"><div class="c-flame cf"></div></div>
                        <div class="c-stick" style="background:linear-gradient(#ff6b9d,#ff006e);"></div>
                        <div class="c-smoke cs"></div>
                    </div>
                    <div class="candle-unit">
                        <div class="c-flame-wrap"><div class="c-flame cf"></div></div>
                        <div class="c-stick" style="background:linear-gradient(#a78bfa,#7c3aed);"></div>
                        <div class="c-smoke cs"></div>
                    </div>
                    <div class="candle-unit">
                        <div class="c-flame-wrap"><div class="c-flame cf"></div></div>
                        <div class="c-stick" style="background:linear-gradient(#60a5fa,#2563eb);"></div>
                        <div class="c-smoke cs"></div>
                    </div>
                    <div class="candle-unit">
                        <div class="c-flame-wrap"><div class="c-flame cf"></div></div>
                        <div class="c-stick" style="background:linear-gradient(#fbbf24,#d97706);"></div>
                        <div class="c-smoke cs"></div>
                    </div>
                    <div class="candle-unit">
                        <div class="c-flame-wrap"><div class="c-flame cf"></div></div>
                        <div class="c-stick" style="background:linear-gradient(#34d399,#059669);"></div>
                        <div class="c-smoke cs"></div>
                    </div>
                </div>
                <div class="cake-tier tier1"></div>
                <div class="cake-tier tier2"></div>
                <div class="cake-tier tier3"></div>
                <div class="cake-base"></div>
            </div>
        </div>
        <p class="cake-hint" id="cakeHint">🎂 Tap the cake to blow the candles</p>
        <div class="wish-result" id="wishResult">
            <span class="emoji-burst">🎉🥳🎊</span>
            <span class="wish-main" id="wishMainText"></span>
        </div>
    </section>

    <!-- LETTER -->
    <section class="section letter-section">
        <div class="letter-card" id="letterCard">
            <div class="letter-hearts">⭐</div>
            <div class="letter-dear" id="letterDear"></div>
            <div class="letter-body" id="letterBody"></div>
            <div class="letter-sign" id="letterSign"></div>
        </div>
    </section>

    <!-- FINAL -->
    <section class="section final-section">
        <div class="final-emoji" id="finalEmoji">🎂</div>
        <div class="final-text" id="finalText"></div>
        <p class="final-sub" id="finalSub"></p>
    </section>

</div>

<script>
/*
╔══════════════════════════════════════════════════════════════╗
║  🎯  CHANGE EVERYTHING HERE — SUPER EASY!                  ║
║  Just edit the values below and the whole site updates.     ║
╚══════════════════════════════════════════════════════════════╝
*/

const CONFIG = {

    // ── WHO IS THE BIRTHDAY PERSON? ──
    name:       "Mr. Ahmed",        // 👈 Change the name
    age:        40,                  // 👈 Change the age

    // ── HERO SECTION ──
    icon:       "👑",               // 👈 Top icon (use 👑 🎓 ⭐ 🌟 etc.)
    subtitle:   "✨ Today we celebrate YOU ✨",

    // ── GIFT BOX MESSAGE ──
    giftText:   "You shaped our minds and inspired our dreams — this is for you! 🌟",

    // ── CANDLE WISH TEXT ──
    wishText:   "May this year bring you joy, good health, and everything you deserve!",

    // ── THE LETTER ──
    letterDear:  "Dear Mr. Ahmed,",
    letterBody: `
        On this special day, we — your students — want you to know
        how much you mean to us.
        <br><br>
        You are not just a teacher, you are a
        <span class="highlight">mentor, a guide, and an inspiration</span>.
        You believed in us when we didn't believe in ourselves.
        <br><br>
        Every lesson you taught went
        <span class="highlight">far beyond the textbook</span>.
        You taught us to think, to dream, and to never give up.
        <br><br>
        Thank you for your patience, your wisdom, and your
        <span class="highlight">incredible dedication</span>.
        We are lucky to have you in our lives.
        <br><br>
        Happy Birthday, best teacher ever! 🎓🌟
    `,
    letterSign:  "With respect & gratitude — Your Students 🙏",

    // ── FINAL SECTION ──
    finalEmoji:  "🎂",
    finalText:   "",                 // leave empty = auto-generated
    finalSub:    "THANK YOU FOR EVERYTHING YOU DO",
};

/*
╔══════════════════════════════════════════════════╗
║  ✅  DONE! You don't need to touch anything     ║
║     below this line. Save and open in browser.  ║
╚══════════════════════════════════════════════════╝
*/


// ═══════ APPLY CONFIG ═══════
function applyConfig() {
    const c = CONFIG;
    const ageStr = String(c.age);

    // Hero
    document.getElementById('heroIcon').textContent = c.icon;
    const ageEl = document.getElementById('heroAge');
    ageEl.innerHTML = '';
    for (let i = 0; i < ageStr.length; i++) {
        const sp = document.createElement('span');
        sp.id = 'digit' + i;
        sp.textContent = ageStr[i];
        ageEl.appendChild(sp);
    }

    document.getElementById('heroName').textContent = c.name + '!';
    document.getElementById('heroSub').textContent = c.subtitle;

    // Gift
    document.getElementById('giftRevealText').textContent = c.giftText;

    // Wish
    document.getElementById('wishMainText').textContent = c.wishText;

    // Letter
    document.getElementById('letterDear').textContent = c.letterDear;
    document.getElementById('letterBody').innerHTML = c.letterBody;
    document.getElementById('letterSign').textContent = c.letterSign;

    // Final
    document.getElementById('finalEmoji').textContent = c.finalEmoji;
    document.getElementById('finalText').textContent =
        c.finalText || `Happy ${c.age}th Birthday, ${c.name}!`;
    document.getElementById('finalSub').textContent = c.finalSub;
}

document.addEventListener('DOMContentLoaded', applyConfig);


// ═══════ SCREEN FLOW ═══════
function startCountdown() {
    document.getElementById('screen1').classList.add('hidden');
    setTimeout(() => {
        document.getElementById('screen2').classList.remove('hidden');
        runCountdown();
    }, 600);
}

function runCountdown() {
    const el = document.getElementById('countNum');
    let count = 3;
    function showNum() {
        el.textContent = count;
        el.classList.remove('pop');
        void el.offsetWidth;
        el.classList.add('pop');
        if (count > 1) { count--; setTimeout(showNum, 900); }
        else setTimeout(bigReveal, 800);
    }
    showNum();
}

function bigReveal() {
    document.getElementById('screen2').classList.add('hidden');
    const s3 = document.getElementById('screen3');
    s3.classList.remove('hidden');
    setTimeout(() => {
        s3.classList.add('hidden');
        document.getElementById('mainContent').classList.add('show');
        heroAnimation();
        launchFireworks();
        launchConfetti();
        launchEmojis();
        createStars();
    }, 400);
}


// ═══════ HERO ANIM ═══════
function heroAnimation() {
    const digits = document.getElementById('heroAge').querySelectorAll('span');
    digits.forEach((d, i) => {
        setTimeout(() => d.classList.add('reveal'), 300 + i * 300);
    });
    setTimeout(() => document.getElementById('heroTitle').classList.add('reveal'), 300 + digits.length * 300 + 200);
    setTimeout(() => document.getElementById('heroName').classList.add('reveal'), 300 + digits.length * 300 + 700);
    setTimeout(() => document.getElementById('heroSub').classList.add('reveal'), 300 + digits.length * 300 + 1200);
}


// ═══════ STARS ═══════
function createStars() {
    const c = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        s.style.left = Math.random() * 100 + '%';
        s.style.top = Math.random() * 100 + '%';
        s.style.width = s.style.height = (Math.random() * 3 + 1) + 'px';
        s.style.animationDuration = (Math.random() * 3 + 2) + 's';
        s.style.animationDelay = (Math.random() * 5) + 's';
        c.appendChild(s);
    }
}


// ═══════ FIREWORKS ═══════
const fwC = document.getElementById('fireworks');
const fwX = fwC.getContext('2d');
let pts = [], fwOn = false;

function rFW() { fwC.width = innerWidth; fwC.height = innerHeight; }
addEventListener('resize', rFW); rFW();

class Pt {
    constructor(x, y, color) {
        this.x = x; this.y = y; this.color = color;
        const a = Math.random() * Math.PI * 2;
        const s = Math.random() * 6 + 2;
        this.vx = Math.cos(a) * s;
        this.vy = Math.sin(a) * s;
        this.alpha = 1;
        this.decay = Math.random() * 0.015 + 0.01;
        this.size = Math.random() * 3 + 1;
    }
    update() { this.x += this.vx; this.y += this.vy; this.vy += 0.05; this.alpha -= this.decay; }
    draw() {
        fwX.save(); fwX.globalAlpha = this.alpha;
        fwX.fillStyle = this.color;
        fwX.beginPath(); fwX.arc(this.x, this.y, this.size, 0, Math.PI*2); fwX.fill();
        fwX.restore();
    }
}

function boom(x, y) {
    const cols = ['#ff006e','#ffd700','#8338ec','#3a86ff','#ff6b9d','#00ffaa','#ff4500','#fff'];
    const c = cols[Math.floor(Math.random() * cols.length)];
    for (let i = 0; i < 80; i++) pts.push(new Pt(x, y, c));
}

function aFW() {
    if (!fwOn && !pts.length) return;
    fwX.clearRect(0, 0, fwC.width, fwC.height);
    pts = pts.filter(p => p.alpha > 0);
    pts.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(aFW);
}

function launchFireworks() {
    fwOn = true;
    let n = 0;
    const iv = setInterval(() => {
        boom(Math.random()*innerWidth, Math.random()*innerHeight*0.6);
        if (++n > 15) { clearInterval(iv); fwOn = false; }
    }, 400);
    aFW();
}


// ═══════ CONFETTI ═══════
const cfC = document.getElementById('confetti');
const cfX = cfC.getContext('2d');
let cfs = [], cfOn = false;

function rCF() { cfC.width = innerWidth; cfC.height = innerHeight; }
addEventListener('resize', rCF); rCF();

class CF {
    constructor() {
        this.x = Math.random() * cfC.width;
        this.y = Math.random() * -cfC.height;
        this.w = Math.random() * 10 + 5;
        this.h = Math.random() * 6 + 3;
        this.color = ['#ff006e','#ffd700','#8338ec','#3a86ff','#10b981','#ff4500','#00ffff','#ff1493','#fff'][Math.floor(Math.random()*9)];
        this.vy = Math.random() * 3 + 1.5;
        this.vx = Math.random() * 2 - 1;
        this.a = Math.random() * 360;
        this.va = Math.random() * 8 - 4;
    }
    update() {
        this.y += this.vy;
        this.x += this.vx + Math.sin(this.a * 0.05) * 0.5;
        this.a += this.va;
        if (this.y > cfC.height + 10) { this.y = -10; this.x = Math.random() * cfC.width; }
    }
    draw() {
        cfX.save();
        cfX.translate(this.x, this.y);
        cfX.rotate((this.a * Math.PI) / 180);
        cfX.fillStyle = this.color;
        cfX.fillRect(-this.w/2, -this.h/2, this.w, this.h);
        cfX.restore();
    }
}

function launchConfetti() {
    cfOn = true;
    for (let i = 0; i < 250; i++) cfs.push(new CF());
    aCF();
    setTimeout(() => { cfOn = false; }, 7000);
    setTimeout(() => { cfs = []; }, 12000);
}

function aCF() {
    if (!cfOn && !cfs.length) return;
    cfX.clearRect(0, 0, cfC.width, cfC.height);
    cfs.forEach(p => { p.update(); p.draw(); });
    requestAnimationFrame(aCF);
}

function miniConfetti() {
    cfOn = true;
    for (let i = 0; i < 100; i++) cfs.push(new CF());
    aCF();
    setTimeout(() => { cfOn = false; }, 3000);
}


// ═══════ EMOJIS ═══════
function launchEmojis() {
    const emojis = ['🎂','🎁','🎈','🥳','🎊','🎉','💖','⭐','✨','🌟','👑','🍰'];
    const box = document.getElementById('floatingEmojis');
    for (let i = 0; i < 25; i++) {
        setTimeout(() => {
            const e = document.createElement('div');
            e.className = 'float-emoji';
            e.textContent = emojis[Math.floor(Math.random() * emojis.length)];
            e.style.left = Math.random() * 100 + '%';
            e.style.fontSize = (Math.random()*1.5+1.2)+'rem';
            e.style.animationDuration = (Math.random()*4+4)+'s';
            box.appendChild(e);
            setTimeout(() => e.remove(), 8000);
        }, i * 300);
    }
}


// ═══════ GIFT ═══════
let gO = false;
function openGift() {
    if (gO) return; gO = true;
    document.getElementById('giftBox').classList.add('opened');
    document.getElementById('giftHint').classList.add('hide');
    setTimeout(() => {
        document.getElementById('giftRevealText').classList.add('show');
        miniConfetti();
    }, 800);
}


// ═══════ CANDLES ═══════
let cB = false;
function blowCandles() {
    if (cB) return; cB = true;
    document.querySelectorAll('.cf').forEach((f, i) => setTimeout(() => f.classList.add('out'), i*150));
    document.querySelectorAll('.cs').forEach((s, i) => setTimeout(() => s.classList.add('rise'), i*150+200));
    document.getElementById('cakeHint').classList.add('hide');
    setTimeout(() => {
        document.getElementById('wishResult').classList.add('show');
        launchFireworks();
        launchEmojis();
    }, 1000);
}


// ═══════ SCROLL REVEAL ═══════
const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.3 });

document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.gift-title,.gift-sub,.cake-title,.letter-card,.final-emoji,.final-text,.final-sub')
        .forEach(el => obs.observe(el));
});
</script>

</body>
</html>
